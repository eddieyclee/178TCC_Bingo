<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>178 TCC Bingo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0a0a0f;--s1:#13131a;--s2:#1c1c26;--b1:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.16);--tx:#f0f0f5;--mu:#7a7a9a;--ac:#7c6fff;--gn:#4ade80;--am:#fbbf24;--rd:#ff6b6b;--fn:'Syne',sans-serif;--mn:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);min-height:100vh;overscroll-behavior:none}
.screen{display:none;min-height:100vh}
.screen.on{display:flex;flex-direction:column}

/* JOIN */
#s-join{align-items:center;justify-content:center;padding:24px}
.jcard{width:100%;max-width:360px}
.j-emoji{font-size:44px;text-align:center;display:block;margin-bottom:10px}
.j-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:4px;letter-spacing:-.5px}
.j-sub{font-size:13px;color:var(--mu);text-align:center;margin-bottom:28px;line-height:1.6}
.lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:7px;display:block}
.inp{width:100%;padding:12px 14px;background:var(--s1);border:1px solid var(--b2);border-radius:11px;color:var(--tx);font-family:var(--fn);font-size:15px;outline:none;margin-bottom:14px;-webkit-appearance:none;transition:border-color .2s}
.inp:focus{border-color:var(--ac)}.inp::placeholder{color:var(--mu)}
.code-inp{font-family:var(--mn);font-size:28px;font-weight:500;letter-spacing:8px;text-transform:uppercase;text-align:center;color:var(--ac);padding:13px}
.code-inp::placeholder{color:var(--mu);letter-spacing:4px;font-size:20px}
.btn{width:100%;padding:14px;background:var(--ac);color:#fff;border:none;border-radius:11px;font-family:var(--fn);font-size:15px;font-weight:700;cursor:pointer;-webkit-appearance:none;transition:all .2s;margin-top:2px}
.btn:active{transform:scale(.97)}
.err{color:var(--rd);font-size:12px;margin-top:8px;text-align:center;min-height:18px}

/* FILL */
#s-fill{align-items:stretch}
.ftop{background:var(--s1);border-bottom:1px solid var(--b1);padding:13px 15px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ftop-t{font-size:14px;font-weight:700}
.ftop-hint{font-size:11px;color:var(--mu)}
.btn-ready{padding:9px 16px;background:var(--gn);color:#0a0a0f;border:none;border-radius:9px;font-family:var(--fn);font-size:13px;font-weight:800;cursor:pointer;opacity:.4;transition:all .2s}
.btn-ready:not(:disabled){opacity:1}
.fbody{flex:1;padding:14px;display:flex;flex-direction:column;align-items:center;gap:12px;overflow-y:auto}
.prog-row{width:100%;max-width:360px;display:flex;align-items:center;gap:10px}
.prog-bg{flex:1;height:5px;background:var(--b2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--am);transition:width .3s}
.prog-t{font-size:11px;color:var(--mu);font-family:var(--mn);flex-shrink:0}

/* BINGO GRID */
.card-wrap{width:100%;max-width:360px}
.card-letters{display:grid;gap:4px;margin-bottom:4px}
.card-letter{text-align:center;font-size:14px;font-weight:800;color:var(--ac);padding:3px 0;letter-spacing:1px}
.card-grid{display:grid;gap:4px}
.cell{aspect-ratio:1;border-radius:10px;border:1.5px solid var(--b2);background:var(--s1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;user-select:none;-webkit-user-select:none;flex-direction:column;padding:4px 3px;overflow:hidden}
.cell:active{transform:scale(.91)}
.cell.free{background:rgba(124,111,255,.15);border-color:var(--ac);cursor:default}
.cell.free .cnum{font-size:11px;font-weight:700;color:var(--ac);font-family:var(--fn)}
.cell.filled{border-color:var(--am);background:rgba(251,191,36,.06)}
.cell.filled .cnum{color:var(--am)}
.cell.empty-cell{border-style:dashed;border-color:rgba(255,255,255,.12)}
/* LOCKED = marked by player after game starts: green glow */
.cell.locked{border-color:var(--gn);background:rgba(74,222,128,.12);cursor:default}
.cell.locked .cnum{color:var(--gn);font-weight:800}
.cell.locked .cnote{color:rgba(74,222,128,.8)}
.cell.locked::after{content:"✓";position:absolute;top:3px;right:5px;font-size:9px;color:var(--gn);font-weight:800}
.cnum{font-family:var(--mn);font-size:15px;font-weight:600;color:var(--tx);line-height:1.1}
.cnote{font-size:9px;color:var(--mu);line-height:1.2;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px;margin-top:2px}
.range-note{font-size:11px;color:var(--mu);text-align:center;line-height:1.8;max-width:300px}

/* NUMBER INPUT MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hide{display:none}
.modal-panel{background:var(--s1);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:420px;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.modal-t{font-size:14px;font-weight:700;margin-bottom:14px;text-align:center;color:var(--mu)}
.num-inp{width:100%;padding:16px;background:var(--s2);border:1px solid var(--b2);border-radius:12px;color:var(--tx);font-family:var(--mn);font-size:36px;font-weight:500;text-align:center;outline:none;margin-bottom:10px;letter-spacing:4px;-webkit-appearance:none}
.note-inp-field{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--b2);border-radius:10px;color:var(--tx);font-family:var(--fn);font-size:14px;outline:none;margin-bottom:14px;-webkit-appearance:none;transition:border-color .2s}
.note-inp-field:focus{border-color:var(--ac)}
.note-inp-field::placeholder{color:var(--mu)}
.num-inp:focus{border-color:var(--ac)}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-ok{padding:14px;background:var(--ac);color:#fff;border:none;border-radius:10px;font-family:var(--fn);font-size:15px;font-weight:700;cursor:pointer}
.btn-clr{padding:14px;background:transparent;color:var(--rd);border:1px solid rgba(255,107,107,.3);border-radius:10px;font-family:var(--fn);font-size:14px;cursor:pointer}
.btn-cancel{padding:12px;background:transparent;color:var(--mu);border:1px solid var(--b2);border-radius:10px;font-family:var(--fn);font-size:13px;cursor:pointer;width:100%;margin-top:8px}

/* WAIT */
#s-wait{align-items:center;justify-content:center;padding:24px;text-align:center}
#s-paused{align-items:center;justify-content:center;padding:24px;text-align:center}
.wait-emoji{font-size:52px;margin-bottom:14px;animation:bob 2s infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.wait-t{font-size:20px;font-weight:700;margin-bottom:8px}
.wait-s{font-size:13px;color:var(--mu);line-height:1.8}
.room-badge{display:inline-block;padding:7px 16px;background:var(--s2);border:1px solid var(--b2);border-radius:9px;font-family:var(--mn);font-size:22px;letter-spacing:5px;color:var(--ac);margin:12px 0}

/* GAME */
#s-game{align-items:stretch}
.gtop{background:var(--s1);border-bottom:1px solid var(--b1);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.g-name{font-size:14px;font-weight:700}
.g-room{font-family:var(--mn);font-size:11px;color:var(--mu)}

.gbody{flex:1;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;overflow-y:auto}

/* BINGO WIN */
#s-bingo{align-items:center;justify-content:center;padding:28px;text-align:center}
.b-emoji{font-size:68px;margin-bottom:14px;animation:rock 1s infinite alternate}
@keyframes rock{from{transform:rotate(-12deg) scale(1)}to{transform:rotate(12deg) scale(1.08)}}
.b-title{font-size:44px;font-weight:800;color:var(--gn);letter-spacing:-1px;margin-bottom:6px}
.b-sub{font-size:15px;color:var(--mu);margin-bottom:28px;line-height:1.6}
.b-btn{padding:13px 28px;background:var(--s2);color:var(--tx);border:1px solid var(--b2);border-radius:12px;font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer}
.hide{display:none!important}
</style>
</head>
<body>

<!-- JOIN -->
<div class="screen on" id="s-join">
  <div class="jcard">
    <span class="j-emoji">🎯</span>
    <div class="j-title">178 TCC Bingo</div>
    <div class="j-sub">輸入主持人的房間代碼加入</div>
    <span class="lbl">房間代碼</span>
    <input class="inp code-inp" id="i-code" maxlength="4" placeholder="XXXX"
      oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
      onkeydown="if(event.key==='Enter')document.getElementById('i-name').focus()">
    <span class="lbl">你的名字</span>
    <input class="inp" id="i-name" maxlength="10" placeholder="輸入名字" style="font-size:17px"
      onkeydown="if(event.key==='Enter')doJoin()">
    <button class="btn" onclick="doJoin()">加入遊戲 →</button>
    <div class="err" id="join-err"></div>
  </div>
</div>

<!-- FILL CARD -->
<div class="screen" id="s-fill">
  <div class="ftop">
    <div><div class="ftop-t">填寫賓果卡</div><div class="ftop-hint" id="fill-hint">點格子輸入數字</div></div>
    <button class="btn-ready" id="btn-ready" onclick="submitCard()" disabled>準備好了 ✓</button>
  </div>
  <div class="fbody">
    <div class="prog-row">
      <div class="prog-bg"><div class="prog-fill" id="fill-prog" style="width:0%"></div></div>
      <div class="prog-t" id="fill-prog-t">0/0</div>
    </div>
    <div class="card-wrap">
      <div class="card-letters" id="f-letters"></div>
      <div class="card-grid" id="f-grid"></div>
    </div>
    <div class="range-note" id="range-note"></div>
  </div>
</div>

<!-- NUMBER INPUT MODAL -->
<div class="modal-bg hide" id="num-modal">
  <div class="modal-panel">
    <div class="modal-t" id="modal-t">輸入數字</div>
    <input class="num-inp" id="num-inp" type="number" placeholder="0"
      onkeydown="if(event.key==='Enter')confirmNum()">
    <div class="modal-btns">
      <button class="btn-ok" onclick="confirmNum()">確認</button>
      <button class="btn-clr" onclick="clearNum()">清除</button>
    </div>
    <button class="btn-cancel" onclick="closeModal()">取消</button>
  </div>
</div>

<!-- GAME NOTE MODAL: shown when player taps a cell during game -->
<div class="modal-bg hide" id="game-modal">
  <div class="modal-panel">
    <div class="modal-t" id="gm-title">確認答對了嗎？</div>
    <div id="gm-num-display" style="font-family:var(--mn);font-size:48px;font-weight:700;text-align:center;color:var(--gn);margin:10px 0 14px;line-height:1"></div>
    <div style="font-size:12px;color:var(--mu);text-align:center;margin-bottom:10px">填寫備註（選填）—— 確認後不可修改</div>
    <input class="note-inp-field" id="gm-note" type="text" maxlength="30" placeholder=""
      onkeydown="if(event.key==='Enter')confirmGameCell()">
    <div class="modal-btns" style="margin-top:4px">
      <button class="btn-ok" onclick="confirmGameCell()">✓ 確認</button>
      <button class="btn-clr" onclick="closeGameModal()">取消</button>
    </div>
  </div>
</div>

<!-- WAITING -->
<div class="screen" id="s-wait">
  <div class="wait-emoji">⏳</div>
  <div class="wait-t">等待主持人開始叫號</div>
  <div class="room-badge" id="w-code">----</div>
  <div class="wait-s">你的賓果卡已提交完成<br>等待主持人按下「開始遊戲」</div>
</div>

<!-- PAUSED -->
<div class="screen" id="s-paused">
  <div class="wait-emoji">⏸</div>
  <div class="wait-t">遊戲暫停中</div>
  <div class="room-badge" id="p-room-code">----</div>
  <div class="wait-s" style="margin-bottom:20px">主持人已暫停遊戲<br>你可以重新整理頁面後用相同名字加入</div>
  <button class="btn" style="max-width:280px;background:var(--ac)" onclick="rejoinGame()">🔄 重新加入遊戲</button>
  <div class="err" id="rejoin-err" style="margin-top:10px"></div>
</div>

<!-- GAME -->
<div class="screen" id="s-game">
  <div class="gtop">
    <div><div class="g-name" id="g-name">玩家</div><div class="g-room" id="g-room">----</div></div>
    <div class="prog-row" style="max-width:120px">
      <div class="prog-bg"><div class="prog-fill" id="g-prog" style="width:0%;background:linear-gradient(90deg,var(--ac),var(--gn))"></div></div>
      <div class="prog-t" id="g-prog-t">0/0</div>
    </div>
  </div>

  <div class="gbody">
    <div class="card-wrap">
      <div class="card-letters" id="g-letters"></div>
      <div class="card-grid" id="g-grid"></div>
    </div>
  </div>
</div>

<!-- BINGO WIN -->
<div class="screen" id="s-bingo">
  <div class="b-emoji">🎉</div>
  <div class="b-title">BINGO!</div>
  <div class="b-sub">恭喜完成連線！<br>等待主持人宣布最終結果</div>
  <div style="font-size:14px;color:var(--gn);margin-top:-16px;margin-bottom:28px;font-weight:700" id="b-lines"></div>
  <button class="b-btn" onclick="returnToGame()">繼續看我的卡片</button>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,onValue,update}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ---- Read params from URL ----
// QR Code URL format: player.html?room=XXXX#fb=encodedUrl
const QP=new URLSearchParams(location.search);
const HASH=new URLSearchParams(location.hash.slice(1)); // remove leading #
const roomParam=QP.get('room')||'';
const fbParam=HASH.get('fb')||QP.get('fb')||localStorage.getItem('bingo_fb2')||'';

if(roomParam)document.getElementById('i-code').value=roomParam.toUpperCase();

let db,roomCode,playerKey,playerName,playerCard=[],cfg={size:5,min:1,max:75};
let lastCalledLen=0,editCell=null,gameLoaded=false;

// ---- Init Firebase ----
async function initFb(url){
  const{initializeApp,getDatabase}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const{getDatabase:gdb}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
}

if(fbParam){
  try{
    const app=initializeApp({databaseURL:decodeURIComponent(fbParam)},'pb'+Date.now());
    db=getDatabase(app);
    localStorage.setItem('bingo_fb2',fbParam);
  }catch(e){
    console.error('Firebase init failed:',e);
    document.getElementById('join-err').textContent='Firebase 連線失敗，請確認連結是否正確';
    document.getElementById('join-err').style.display='block';
  }
} else {
  // No FB URL in QR - show error hint
  document.getElementById('join-err').textContent='⚠ 請掃描主持人的 QR Code 或直接點連結加入';
  document.getElementById('join-err').style.display='block';
}

window.go=id_=>{document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('on',s.id===id_))};

window.doJoin=async()=>{
  if(!db){document.getElementById('join-err').textContent='Firebase 未連線，請掃描 QR Code 重試';return}
  const code=document.getElementById('i-code').value.trim().toUpperCase();
  const name=document.getElementById('i-name').value.trim();
  const err=document.getElementById('join-err');
  if(code.length!==4){err.textContent='請輸入4位房間代碼';err.style.display='block';return}
  if(!name){err.textContent='請輸入你的名字';err.style.display='block';return}
  err.textContent='連線中...';err.style.display='block';
  try{
    const snap=await get(ref(db,'rooms/'+code));
    if(!snap.exists()){err.textContent='找不到此房間，請確認代碼';return}
    const data=snap.val();
    // Block joining if game is playing (not paused)
    if(data.status==='playing'){
      // Allow if same name already exists (reconnecting)
      const players=data.players||{};
      const existing=Object.entries(players).find(([,p])=>p.name===name);
      if(existing){
        // Reconnect: reuse existing player key and card
        const[key,p]=existing;
        playerKey=key;cfg=data.config||cfg;
        if(p.card&&p.card.length>0){
          playerCard=p.card.map(c=>({...c,note:c.note||'',locked:c.locked||false}));
          gameLoaded=false;
        }
        document.getElementById('w-code').textContent=code;
        document.getElementById('g-name').textContent=name;
        document.getElementById('g-room').textContent='ROOM: '+code;
        roomCode=code;playerName=name;
        window._lastBingoLines=0;
        buildGameGrid();go('s-game');
        listenRoom();
        err.style.display='none';
        return;
      }
      err.textContent='遊戲已開始，無法加入此房間';
      err.style.display='block';
      return;
    }
    if(data.status==='paused'){
      // Allow re-joining during pause (match by name)
      const players=data.players||{};
      const existing=Object.entries(players).find(([,p])=>p.name===name);
      if(existing){
        const[key,p]=existing;
        playerKey=key;cfg=data.config||cfg;
        if(p.card&&p.card.length>0){
          playerCard=p.card.map(c=>({...c,note:c.note||'',locked:c.locked||false}));
          gameLoaded=false;
        }
        document.getElementById('w-code').textContent=code;
        document.getElementById('g-name').textContent=name;
        document.getElementById('g-room').textContent='ROOM: '+code;
        document.getElementById('p-room-code').textContent=code;
        roomCode=code;playerName=name;
        window._lastBingoLines=0;
        go('s-paused');
        listenRoom();
        err.style.display='none';
        return;
      }
      err.textContent='遊戲暫停中，僅限原本的玩家重新加入';
      err.style.display='block';
      return;
    }
    cfg=data.config||cfg;
    roomCode=code;playerName=name;
    playerKey='p_'+Date.now()+'_'+Math.random().toString(36).substr(2,4);
    await set(ref(db,`rooms/${code}/players/${playerKey}`),{name,markedCount:0,bingo:false,filled:0,joinedAt:Date.now()});
    document.getElementById('w-code').textContent=code;
    document.getElementById('g-name').textContent=name;
    document.getElementById('g-room').textContent='ROOM: '+code;
    gameLoaded=false;
    buildFillCard();
    go('s-fill');
    listenRoom();
    err.style.display='none';
  }catch(e){err.textContent='加入失敗：'+e.message;err.style.display='block'}
};

function buildFillCard(){
  const{size,min,max}=cfg;
  const LETTERS=['B','I','N','G','O'];
  playerCard=[];
  for(let r=0;r<size;r++)for(let c=0;c<size;c++){
    playerCard.push({r,c,num:null,note:"",marked:false,locked:false,free:false});
  }
  const lEl=document.getElementById('f-letters');
  lEl.style.gridTemplateColumns=`repeat(${size},1fr)`;
  lEl.innerHTML=size===5?LETTERS.map(l=>`<div class="card-letter">${l}</div>`).join(''):'';
  document.getElementById('f-grid').style.gridTemplateColumns=`repeat(${size},1fr)`;
  document.getElementById('range-note').textContent=`數字範圍：${min} ～ ${max}，每格填一個不重複的數字`;
  renderFillGrid();
}

function renderFillGrid(){
  const total=cfg.size*cfg.size;
  document.getElementById('f-grid').innerHTML=playerCard.map((cell,i)=>{
    const has=cell.num!==null;
    return`<div class="cell${has?' filled':' empty-cell'}" onclick="openModal(${i})"><span class="cnum">${has?cell.num:''}</span></div>`;
  }).join('');
  const filled=playerCard.filter(c=>c.num!==null).length;
  const pct=Math.round(filled/total*100);
  document.getElementById('fill-prog').style.width=pct+'%';
  document.getElementById('fill-prog-t').textContent=`${filled}/${total}`;
  document.getElementById('btn-ready').disabled=filled<total;
}

window.openModal=idx=>{
  editCell=idx;
  const cell=playerCard[idx];
  document.getElementById('modal-t').textContent=`格子 (${cell.r+1},${cell.c+1})  輸入 ${cfg.min}～${cfg.max}`;
  const inp=document.getElementById('num-inp');
  inp.value=cell.num||'';inp.min=cfg.min;inp.max=cfg.max;
  document.getElementById('num-modal').classList.remove('hide');
  setTimeout(()=>{inp.focus();inp.select()},80);
};
window.closeModal=()=>{document.getElementById('num-modal').classList.add('hide');editCell=null};
window.confirmNum=()=>{
  if(editCell===null)return;
  const n=parseInt(document.getElementById('num-inp').value);
  if(isNaN(n)||n<cfg.min||n>cfg.max){alert(`請輸入 ${cfg.min}～${cfg.max} 之間的整數`);return}
  if(playerCard.some((c,i)=>i!==editCell&&c.num===n)){alert('這個數字已填過，請換一個');return}
  playerCard[editCell].num=n;closeModal();renderFillGrid();
};
window.clearNum=()=>{if(editCell===null)return;playerCard[editCell].num=null;closeModal();renderFillGrid()};

window.submitCard=async()=>{
  const total=cfg.size*cfg.size;
  if(playerCard.filter(c=>c.num!==null).length<total){alert('請填完所有格子');return}
  const cardData=playerCard.map(c=>({r:c.r,c:c.c,num:c.num,note:"",free:false,marked:false,locked:false}));
  await update(ref(db,`rooms/${roomCode}/players/${playerKey}`),{card:cardData,filled:total,markedCount:0,bingo:false});
  gameLoaded=false;
  go('s-wait');
};

function listenRoom(){
  onValue(ref(db,'rooms/'+roomCode),snap=>{
    const data=snap.val()||{};
    const called=data.calledNumbers||[];
    const me=data.players?.[playerKey];
    const st=data.status||'waiting';

    // If player was removed (no longer in players list), go back to join
    if(!me){
      // Don't react if we haven't joined yet
      if(roomCode&&gameLoaded)go('s-join');
      return;
    }

    // Card reset by host
    if(me.cardReset&&me.cardReset!==window._lastReset){
      window._lastReset=me.cardReset;cfg=data.config||cfg;
      playerCard=[];gameLoaded=false;lastCalledLen=0;window._lastBingoLines=0;buildFillCard();go('s-fill');return;
    }

    // Paused: show paused screen (keep card state)
    if(st==='paused'){
      document.getElementById('p-room-code').textContent=roomCode;
      // Only switch to paused screen if currently in game
      const cur=document.querySelector('.screen.on')?.id;
      if(cur==='s-game'||cur==='s-bingo')go('s-paused');
      return;
    }

    // Playing
    if(st==='playing'&&me.card&&me.card.length>0){
      if(!gameLoaded){
        gameLoaded=true;
        playerCard=me.card.map(c=>({...c,note:c.note||"",locked:c.locked||false}));
        lastCalledLen=called.length;
        buildGameGrid();go('s-game');
      } else {
        // If coming back from paused screen, resume game
        const cur=document.querySelector('.screen.on')?.id;
        if(cur==='s-paused')go('s-game');
        if(called.length>lastCalledLen){
          processNewNums(called.slice(lastCalledLen));
          lastCalledLen=called.length;
        }
      }
    }
  });
}

// Re-join after page reload during pause or disconnect
window.rejoinGame=async()=>{
  const err=document.getElementById('rejoin-err');
  if(!db){err.textContent='Firebase 未連線，請重新整理頁面';err.style.display='block';return}
  if(!roomCode||!playerName){
    // Redirect to join screen with pre-filled code
    go('s-join');
    return;
  }
  err.textContent='重新連線中...';err.style.display='block';
  try{
    const snap=await get(ref(db,'rooms/'+roomCode));
    if(!snap.exists()){err.textContent='房間不存在';return}
    const data=snap.val();
    // Find existing player by name
    const players=data.players||{};
    const match=Object.entries(players).find(([,p])=>p.name===playerName);
    if(match){
      const[key,p]=match;
      playerKey=key;
      cfg=data.config||cfg;
      if(p.card&&p.card.length>0){
        playerCard=p.card.map(c=>({...c,note:c.note||'',locked:c.locked||false}));
        gameLoaded=false; // will re-enter game on next listen
      }
      document.getElementById('g-name').textContent=playerName;
      document.getElementById('g-room').textContent='ROOM: '+roomCode;
      err.style.display='none';
      if(data.status==='paused'){go('s-paused');}
      else if(data.status==='playing'){buildGameGrid();go('s-game');}
    } else {
      err.textContent='找不到你的資料，請回到加入頁面重新輸入';
    }
  }catch(e){err.textContent='重新連線失敗：'+e.message}
};

function buildGameGrid(){
  const{size}=cfg;const LETTERS=['B','I','N','G','O'];
  const lEl=document.getElementById('g-letters');
  lEl.style.gridTemplateColumns=`repeat(${size},1fr)`;
  lEl.innerHTML=size===5?LETTERS.map(l=>`<div class="card-letter">${l}</div>`).join(''):'';
  document.getElementById('g-grid').style.gridTemplateColumns=`repeat(${size},1fr)`;
  renderGameGrid();
}

function renderGameGrid(){
  const total=cfg.size*cfg.size;
  document.getElementById('g-grid').innerHTML=playerCard.map((cell,i)=>{
    const gNote=cell.note?`<span class="cnote">${cell.note}</span>`:'';
    const cls=cell.locked?'cell locked':'cell';
    const click=cell.locked?'':'onclick="openGameModal('+i+')"';
    return`<div class="${cls}" ${click}><span class="cnum">${cell.num||''}</span>${gNote}</div>`;
  }).join('');
  const marked=playerCard.filter(c=>c.marked).length;
  const pct=Math.round(marked/total*100);
  document.getElementById('g-prog').style.width=pct+'%';
  document.getElementById('g-prog-t').textContent=`${marked}/${total}`;
}

// openGameModal: tap cell in game → show note input → confirm to lock
window.openGameModal=idx=>{
  const cell=playerCard[idx];
  if(!cell||cell.locked)return;
  window._editGameCell=idx;
  document.getElementById('gm-title').textContent=`格子數字：${cell.num}`;
  document.getElementById('gm-num-display').textContent=cell.num;
  document.getElementById('gm-note').value='';
  document.getElementById('game-modal').classList.remove('hide');
  setTimeout(()=>document.getElementById('gm-note').focus(),80);
};

window.closeGameModal=()=>{
  document.getElementById('game-modal').classList.add('hide');
  window._editGameCell=null;
};

window.confirmGameCell=()=>{
  const idx=window._editGameCell;
  if(idx===null||idx===undefined)return;
  const cell=playerCard[idx];
  if(!cell||cell.locked)return;
  cell.marked=true;
  cell.locked=true;
  cell.note=document.getElementById('gm-note').value.trim();
  closeGameModal();
  renderGameGrid();
  const prevLines=window._lastBingoLines||0;
  const newLines=countBingoLines();
  if(newLines>prevLines){
    window._lastBingoLines=newLines;
    // Update bingo sub-text with line count
    const sub=document.getElementById('b-lines');
    if(sub)sub.textContent=`目前共 ${newLines} 條連線`;
    setTimeout(()=>go('s-bingo'),400);
  }
  syncProgress();
};

async function syncProgress(){
  const marked=playerCard.filter(c=>c.marked).length;
  const bingo=countBingoLines()>0;
  const cardData=playerCard.map(c=>({r:c.r,c:c.c,num:c.num,note:c.note||"",free:false,marked:c.marked,locked:c.locked||false}));
  await update(ref(db,`rooms/${roomCode}/players/${playerKey}`),{markedCount:marked,bingo,card:cardData});
}

window.returnToGame=function(){
  // Record current line count so we don't re-trigger for same lines
  window._lastBingoLines=countBingoLines();
  go('s-game');
}

function countBingoLines(){
  const sz=cfg.size;
  const g=(r,c)=>playerCard.find(x=>x.r===r&&x.c===c)?.marked||false;
  let n=0;
  for(let i=0;i<sz;i++){
    if(Array.from({length:sz},(_,j)=>g(i,j)).every(Boolean))n++;
    if(Array.from({length:sz},(_,j)=>g(j,i)).every(Boolean))n++;
  }
  if(Array.from({length:sz},(_,i)=>g(i,i)).every(Boolean))n++;
  if(Array.from({length:sz},(_,i)=>g(i,sz-1-i)).every(Boolean))n++;
  return n;
}
function checkBingo(){return countBingoLines()>0;}
